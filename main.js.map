<div class="container">
    <h4>How We Can Help?</h4>
    <h1 class="mt-3">We're <span>Helping Employers</span> Get</h1>
</div>

<div class="container d-flex align-items-center mt-4">
    <div class="row">
        <div class="col-lg-4 productDiv" *ngFor="let service of services">
            <div class="imgBox mx-auto" [ngStyle]="{'background-image': 'url(' + service.photo_link + ')'}"></div>
            <p class="text-center">{{service.name}}</p>
        </div>
    </div>
</div>

<div class="container quoteContainer d-flex flex-column align-items-center justify-content-center">
    <h2 class="text-center darkBlue">Get started with our awesome service today</h2>
    <p class="text-center darkBlue">Productboard is the product management system that helps you understand what users need.</p>
    <button class="mx-auto" routerLink="/services">Get Service</button>
</div>
